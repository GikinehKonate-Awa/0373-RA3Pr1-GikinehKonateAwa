<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulari de Notes</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">

    <header class="page-header">
      <div class="icon">📋</div>
      <h1>Formulari de Notes</h1>
    </header>

    <div class="card">
      <p class="card-title">Afegir alumne</p>

      <div class="form-grid">

        <div class="camp camp-nom">
          <label for="nom">Nom de l'alumne</label>
          <input type="text" id="nom" placeholder="Ex: Anna Cortés" />
          <span class="missatge-error" id="err-nom">El nom no pot estar buit.</span>
        </div>

        <div class="camp">
          <div class="label-row">
            <label for="examen">Nota examen</label>
            <span class="badge-pes">60 %</span>
          </div>
          <input type="number" id="examen" placeholder="0 – 10" min="0" max="10" step="0.01" />
          <span class="missatge-error" id="err-examen">Ha de ser un número entre 0 i 10.</span>
        </div>

        <div class="camp">
          <div class="label-row">
            <label for="practiques">Nota pràctiques</label>
            <span class="badge-pes">30 %</span>
          </div>
          <input type="number" id="practiques" placeholder="0 – 10" min="0" max="10" step="0.01" />
          <span class="missatge-error" id="err-practiques">Ha de ser un número entre 0 i 10.</span>
        </div>

        <div class="camp">
          <div class="label-row">
            <label for="actitud">Nota actitud</label>
            <span class="badge-pes">10 %</span>
          </div>
          <input type="number" id="actitud" placeholder="0 – 10" min="0" max="10" step="0.01" />
          <span class="missatge-error" id="err-actitud">Ha de ser un número entre 0 i 10.</span>
        </div>

      </div>

      <button class="btn-primary" id="btn-afegir">
        <span>＋</span> Afegir alumne
      </button>
    </div>

    <div class="section-header">
      <span class="section-title">Llista d'alumnes</span>
      <div class="sort-btns">
        <button class="btn-sort" onclick="ordenarAlumnes('desc')">▼ Major a menor</button>
        <button class="btn-sort" onclick="ordenarAlumnes('asc')">▲ Menor a major</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Alumne</th>
            <th>Examen</th>
            <th>Pràctiques</th>
            <th>Actitud</th>
            <th>Nota Final</th>
            <th>Estat</th>
          </tr>
        </thead>
        <tbody id="cos-taula">
          <tr><td colspan="6" id="missatge-buit">Encara no hi ha alumnes.</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
